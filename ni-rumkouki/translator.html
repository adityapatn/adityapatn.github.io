<html>

<head>
    <meta name="viewport" content="width=device-width">
    <link href="style.css" rel="stylesheet" type="text/css" />
    <title>
        Ni Rumkouki Translator
    </title>
</head>

<body>
    <h1>
        Welcome to the Official Ni Rumkouki Translator
    </h1>

    <textarea readonly id="translated" name="translate2" rows="10" cols="50" placeholder="Corresponding translation will appear here"></textarea>
    <script src="script.js"></script>
</body>

</html>
